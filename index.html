<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1B1E">
<title>AquaLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg: #0F1B1E;
    --surface: #16262A;
    --surface-2: #1D3034;
    --border: #24393D;
    --text: #EDF3F2;
    --text-muted: #8FA6A3;
    --good: #6FBF73;
    --warn: #E8A33D;
    --danger: #E8604C;
    --accent: #4FB6C4;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(79,182,196,0.10), transparent 60%),
      var(--bg);
  }
  .mono{ font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; }

  /* Top bar */
  header{
    padding: 18px 18px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom: 1px solid var(--border);
  }
  .brand{ display:flex; flex-direction:column; gap:2px; }
  .brand-title{
    font-family: 'Space Grotesk','Inter',sans-serif;
    font-size: 20px;
    font-weight:700;
    letter-spacing: 0.2px;
  }
  .brand-title span{ color: var(--accent); }
  .tank-select{
    background:none; border:none; color:var(--text-muted); font-size:13px;
    padding:0; display:flex; align-items:center; gap:6px; cursor:pointer;
  }
  .tank-select b{ color:var(--text); font-weight:600; }
  .icon-btn{
    background: var(--surface);
    border: 1px solid var(--border);
    width:38px; height:38px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    color: var(--text-muted); cursor:pointer;
  }
  .icon-btn:active{ background: var(--surface-2); }

  main{ flex:1; padding: 16px 16px 100px; overflow-y:auto; }

  /* Tank chips */
  .tank-chips{ display:flex; gap:8px; overflow-x:auto; padding-bottom:14px; }
  .chip{
    flex-shrink:0;
    padding:7px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{ background: var(--accent); color:#06181A; border-color:var(--accent); font-weight:600; }

  .section-label{
    font-size:11px; text-transform:uppercase; letter-spacing:1.2px;
    color:var(--text-muted); margin: 4px 2px 10px;
  }

  /* Param grid */
  .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .card{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px;
    display:flex; flex-direction:column; gap:8px;
  }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .param-label{ font-size:12px; color:var(--text-muted); }
  .status-dot{ width:8px; height:8px; border-radius:50%; margin-top:4px; }
  .status-dot.good{ background: var(--good); }
  .status-dot.warn{ background: var(--warn); }
  .status-dot.danger{ background: var(--danger); }
  .status-dot.none{ background: #3a4a4d; }
  .param-value{ font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; }
  .param-value small{ font-size:13px; font-weight:500; color:var(--text-muted); margin-left:3px; }
  .swatch{
    height:8px; border-radius:5px; position:relative; margin-top:2px;
  }
  .swatch .pointer{
    position:absolute; top:-3px; width:2px; height:14px; background:#fff;
    border-radius:2px; box-shadow:0 0 0 1px rgba(0,0,0,0.4);
  }
  .spark{ align-self:flex-end; opacity:0.9; }
  .empty-hint{ font-size:11px; color:var(--text-muted); }

  /* Recommendations */
  .rec-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
  .rec-card{
    display:flex; align-items:flex-start; gap:8px;
    border-radius:12px; padding:10px 12px; font-size:13px;
    border:1px solid var(--border);
  }
  .rec-card.rec-good{ background:rgba(111,191,115,0.1); color:var(--good); border-color:rgba(111,191,115,0.3); font-weight:600; margin-bottom:18px; }
  .rec-card.rec-warn{ background:rgba(232,163,61,0.1); border-color:rgba(232,163,61,0.3); }
  .rec-card.rec-danger{ background:rgba(232,96,76,0.1); border-color:rgba(232,96,76,0.3); }
  .rec-text{ color:var(--text); line-height:1.4; }

  /* Besatz-Assistent */
  .fish-row{
    background: var(--surface-2); border:1px solid var(--border); border-radius:12px;
    padding:10px 12px; margin-bottom:8px;
  }
  .fish-row-top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .fish-name{ font-weight:600; font-size:14px; }
  .fish-meta{ font-size:11px; color:var(--text-muted); }
  .fish-issue{ font-size:12px; margin-top:5px; line-height:1.4; }
  .fish-issue.warn{ color: var(--warn); }
  .fish-issue.danger{ color: var(--danger); }
  .fish-issue.good{ color: var(--good); }

  /* Trends */
  .param-chips{ display:flex; flex-wrap:wrap; gap:8px; padding-bottom:14px; }
  .param-chip{
    flex-shrink:0;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .param-chip .dot{ width:7px; height:7px; border-radius:50%; }
  .param-chip.active{ background: var(--surface-2); color:var(--text); border-color: var(--accent); }
  .chart-card{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 12px 12px;
  }
  .chart-card .stats-row{
    display:flex; justify-content:space-between; padding:0 6px 14px;
  }
  .chart-stat{ display:flex; flex-direction:column; gap:2px; }
  .chart-stat .label{ font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); }
  .chart-stat .value{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; }
  .chart-wrap{ position:relative; height:220px; }
  .legend-row{ display:flex; gap:16px; justify-content:center; margin-top:10px; font-size:11px; color:var(--text-muted); }
  .legend-row .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }

  .empty-state{
    text-align:center; padding: 60px 20px; color:var(--text-muted);
  }
  .empty-state .big{ font-size:40px; margin-bottom:10px; }

  /* History */
  .history-item{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .history-item .date{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; }
  .history-item .vals{ margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; }
  .tag{
    font-size:11px; padding:3px 8px; border-radius:7px;
    background: var(--surface-2); color:var(--text-muted);
  }
  .tag b{ color:var(--text); }
  .history-item .note{ margin-top:6px; font-size:12px; color:var(--text-muted); font-style:italic; }

  /* Bottom nav */
  nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    background: rgba(22,38,42,0.92);
    backdrop-filter: blur(10px);
    border-top:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-around;
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
  }
  .nav-btn{
    background:none; border:none; color:var(--text-muted);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:11px; cursor:pointer; padding:6px 10px;
  }
  .nav-btn.active{ color: var(--accent); }
  .fab{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom: calc(52px + env(safe-area-inset-bottom));
    width:54px; height:54px; border-radius:50%;
    background: var(--accent); color:#06181A;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:400;
    border:none; cursor:pointer;
    box-shadow: 0 6px 18px rgba(79,182,196,0.35);
    z-index:10;
  }

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(6,12,13,0.6);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
  }
  .sheet{
    width:100%; max-width:480px;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 18px 18px calc(20px + env(safe-area-inset-bottom));
    max-height: 88vh; overflow-y:auto;
    border-top:1px solid var(--border);
  }
  .sheet-title{ font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:700; margin-bottom:14px; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--text-muted); margin-bottom:5px; }
  .field input, .field select, .field textarea{
    width:100%; background: var(--surface-2); border:1px solid var(--border);
    border-radius:10px; padding:10px 12px; color:var(--text); font-size:15px;
    font-family:'IBM Plex Mono',monospace;
  }
  .field textarea{ font-family:'Inter',sans-serif; resize:none; height:56px; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .field label.checkbox-label{
    display:flex; align-items:center; gap:9px; cursor:pointer;
    font-size:14px; color:var(--text); margin-bottom:0;
  }
  .checkbox-label input[type=checkbox]{ width:18px; height:18px; accent-color: var(--accent); flex-shrink:0; }
  .btn{
    width:100%; padding:13px; border-radius:12px; border:none;
    font-size:15px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .btn-primary{ background: var(--accent); color:#06181A; }
  .btn-danger{ background:transparent; color:var(--danger); border:1px solid var(--danger); margin-top:8px; }
  .btn-ghost{ background:transparent; color:var(--text-muted); border:1px solid var(--border); margin-top:8px; }
  .close-x{ position:absolute; top:16px; right:16px; color:var(--text-muted); background:none; border:none; font-size:20px; cursor:pointer; }
  .sheet{ position:relative; }
  .tank-row{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .tank-row input{ flex:1; }
  .tank-row button{ flex-shrink:0; }
  .loading{ text-align:center; padding:60px 0; color:var(--text-muted); }
</style>
</head>

let state = { tanks: [], entries: [], events: [], activeTankId: null };
let ui = { tab:'overview', modal:null, editingEntryId:null, editingEventId:null, tankModalMode:null, selectedParam:'ph' };
let trendChart = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

const STORAGE_KEY = 'aqualog-data-v1';
const FIREBASE_URL = 'https://aqualog-94d37-default-rtdb.europe-west1.firebasedatabase.app';
const FIREBASE_PATH = 'aqualog/f7e3a9c2-51b8-4d6a-9c2e-8a1b6d4f0e77';

async function storageGet(){
  try{
    const res = await fetch(`${FIREBASE_URL}/${FIREBASE_PATH}.json`);
    if(!res.ok) throw new Error('Firebase-Antwort nicht ok');
    const data = await res.json();
    const json = data ? JSON.stringify(data) : null;
    if(json){ try{ localStorage.setItem(STORAGE_KEY, json); }catch(_){} }
    return json;
  }catch(e){
    console.error('Firebase nicht erreichbar, nutze lokalen Zwischenspeicher', e);
    return localStorage.getItem(STORAGE_KEY);
  }
}

async function storageSet(value){
  try{
    const res = await fetch(`${FIREBASE_URL}/${FIREBASE_PATH}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: value
    });
    if(!res.ok) throw new Error('Firebase-Speichern fehlgeschlagen');
    try{ localStorage.setItem(STORAGE_KEY, value); }catch(_){}
    return true;
  }catch(e){
    console.error(e);
    try{ localStorage.setItem(STORAGE_KEY, value); }catch(_){}
    return false;
  }
}

async function loadState(){
  try{
    const raw = await storageGet();
    if(raw){
      state = JSON.parse(raw);
    } else {
      throw new Error('empty');
    }
  }catch(e){
    const firstTank = { id: uid(), name: 'Mein Aquarium' };
    state = { tanks:[firstTank], entries:[], events:[], activeTankId: firstTank.id };
    await saveState();
  }
  normalizeState();
  render();
}

function normalizeState(){
  // Firebase Realtime Database drops empty arrays/objects on save, so a field
  // that was an empty list comes back as undefined after a reload. Normalize.
  if(!Array.isArray(state.tanks)){
    state.tanks = state.tanks ? Object.values(state.tanks) : [];
  }
  if(!Array.isArray(state.entries)){
    state.entries = state.entries ? Object.values(state.entries) : [];
  }
  if(!Array.isArray(state.events)){
    state.events = state.events ? Object.values(state.events) : [];
  }
  if(state.tanks.length === 0){
    const firstTank = { id: uid(), name: 'Mein Aquarium' };
    state.tanks = [firstTank];
    state.activeTankId = firstTank.id;
  }
  if(!state.activeTankId && state.tanks.length){ state.activeTankId = state.tanks[0].id; }
}

async function saveState(){
  const ok = await storageSet(JSON.stringify(state));
  if(!ok){
    console.error('Cloud-Speichern fehlgeschlagen, lokal zwischengespeichert');
    alert('Konnte gerade nicht in die Cloud speichern (kein Internet?). Die Änderung ist vorerst nur lokal gesichert.');
  }
}

function getStatus(param, value){
  if(value === null || value === undefined || value === '' || isNaN(value)) return null;
  const v = Number(value);
  const [gMin,gMax] = param.good;
  const [wMin,wMax] = param.warn;
  if(v >= gMin && v <= gMax) return 'good';
  if(v >= wMin && v <= wMax) return 'warn';
  return 'danger';
}

function buildGradient(param){
  const steps = 24;
  let stops = [];
  for(let i=0;i<=steps;i++){
    const v = param.min + (param.max-param.min)*(i/steps);
    const s = getStatus(param, v) || 'good';
    stops.push(`${STATUS_COLOR[s]} ${(i/steps*100).toFixed(1)}%`);
  }
  return `linear-gradient(90deg, ${stops.join(',')})`;
}

function pointerPos(param, value){
  const v = Number(value);
  let pct = (v - param.min) / (param.max - param.min);
  pct = Math.max(0, Math.min(1, pct));
  return (pct*100).toFixed(1) + '%';
}

function fmt(param, value){
  if(value === null || value === undefined || value === '') return null;
  return Number(value).toFixed(param.decimals);
}

function activeTank(){
  return state.tanks.find(t => t.id === state.activeTankId);
}
function tankEntries(){
  return (state.entries || [])
    .filter(e => e.tankId === state.activeTankId)
    .sort((a,b) => a.date < b.date ? 1 : -1);
}
function tankEvents(){
  return (state.events || [])
    .filter(e => e.tankId === state.activeTankId)
    .sort((a,b) => a.date < b.date ? 1 : -1);
}
function lastValueFor(key){
  const entries = tankEntries();
  for(const e of entries){
    if(e[key] !== null && e[key] !== undefined && e[key] !== '') return e;
  }
  return null;
}
function sparkValues(key, count){
  const entries = tankEntries().slice().reverse(); // chronological
  const vals = entries.filter(e => e[key] !== null && e[key] !== undefined && e[key] !== '').map(e => Number(e[key]));
  return vals.slice(-count);
}

function sparkSvg(param){
  const vals = sparkValues(param.key, 6);
  if(vals.length < 2) return '';
  const w=64,h=26,pad=3;
  const min = Math.min(...vals, param.good[0]);
  const max = Math.max(...vals, param.good[1]);
  const range = (max-min) || 1;
  const pts = vals.map((v,i) => {
    const x = pad + (w-2*pad) * (i/(vals.length-1));
    const y = h-pad - (h-2*pad) * ((v-min)/range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lastStatus = getStatus(param, vals[vals.length-1]) || 'good';
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${STATUS_COLOR[lastStatus]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function getRecommendations(){
  const recs = [];
  PARAMS.forEach(p => {
    const entryWithVal = lastValueFor(p.key);
    if(!entryWithVal) return;
    const value = entryWithVal[p.key];
    const status = getStatus(p, value);
    if(status === 'warn' || status === 'danger'){
      const direction = Number(value) < p.good[0] ? 'low' : 'high';
      const dict = RECOMMENDATIONS[p.key] && RECOMMENDATIONS[p.key][direction];
      const message = (dict && dict[status]) || `${p.label} liegt außerhalb des Idealbereichs.`;
      recs.push({ key:p.key, param:p, status, message, value });
    }
  });
  recs.sort((a,b) => (a.status === 'danger' ? 0 : 1) - (b.status === 'danger' ? 0 : 1));
  return recs;
}

function renderRecommendations(){
  const recs = getRecommendations();
  if(recs.length === 0){
    return `<div class="rec-card rec-good">✅ Alle gemessenen Werte sind im grünen Bereich.</div>`;
  }
  return `
    <div class="rec-list">
      ${recs.map(r => `
        <div class="rec-card rec-${r.status}">
          <span class="rec-icon">${r.status === 'danger' ? '🔴' : '🟡'}</span>
          <div class="rec-text"><b>${escapeHtml(r.param.label)}</b> (${fmt(r.param, r.value)}${r.param.unit}): ${escapeHtml(r.message)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderOverview(main){
  const entries = tankEntries();
  if(entries.length === 0){
    main.innerHTML = `<div class="empty-state"><div class="big">💧</div>Noch keine Messwerte für dieses Aquarium.<br>Tippe unten auf <b>+</b>, um deinen ersten Eintrag zu machen.</div>`;
    return;
  }
  const latest = entries[0];
  const cards = PARAMS.map(p => {
    const entryWithVal = lastValueFor(p.key);
    const value = entryWithVal ? entryWithVal[p.key] : null;
    const status = value !== null ? getStatus(p, value) : null;
    const gradient = buildGradient(p);
    const spark = sparkSvg(p);
    return `
      <div class="card">
        <div class="card-top">
          <div class="param-label">${p.label}</div>
          <div class="status-dot ${status || 'none'}"></div>
        </div>
        ${value !== null ? `
          <div class="param-value">${fmt(p,value)}<small>${p.unit}</small></div>
          <div class="swatch" style="background:${gradient}">
            <div class="pointer" style="left:${pointerPos(p,value)}"></div>
          </div>
          ${spark || '<div class="empty-hint">noch keine Trenddaten</div>'}
        ` : `<div class="empty-hint">Kein Wert erfasst</div>`}
      </div>
    `;
  }).join('');
  main.innerHTML = `
    <div class="section-label">Bewertung</div>
    ${renderRecommendations()}
    <div class="section-label">Letzter Eintrag: ${formatDate(latest.date)}</div>
    <div class="grid">${cards}</div>
  `;
}

function renderTrends(main){
  const entries = tankEntries();
  if(entries.length === 0){
    main.innerHTML = `<div class="empty-state"><div class="big">📈</div>Noch keine Messwerte für Trends.<br>Tippe unten auf <b>+</b>, um deinen ersten Eintrag zu machen.</div>`;
    return;
  }
  const param = PARAMS.find(p => p.key === ui.selectedParam) || PARAMS[0];
  const chips = PARAMS.map(p => `
    <button class="param-chip ${p.key===param.key?'active':''}" onclick="selectTrendParam('${p.key}')">
      <span class="dot" style="background:${STATUS_COLOR.good}"></span>${p.label.split(' ')[0]}
    </button>
  `).join('');

  const chron = entries.slice().reverse();
  const withVal = chron.filter(e => e[param.key] !== null && e[param.key] !== undefined && e[param.key] !== '');

  if(withVal.length === 0){
    main.innerHTML = `
      <div class="section-label">Trend wählen</div>
      <div class="param-chips">${chips}</div>
      <div class="empty-state"><div class="big">💧</div>Für ${escapeHtml(param.label)} liegen noch keine Werte vor.</div>
    `;
    return;
  }

  const values = withVal.map(e => Number(e[param.key]));
  const latestVal = values[values.length - 1];
  const avgVal = values.reduce((a,b)=>a+b,0) / values.length;
  const latestStatus = getStatus(param, latestVal) || 'good';

  main.innerHTML = `
    <div class="section-label">Trend wählen</div>
    <div class="param-chips">${chips}</div>
    <div class="chart-card">
      <div class="stats-row">
        <div class="chart-stat">
          <div class="label">Aktuell</div>
          <div class="value" style="color:${STATUS_COLOR[latestStatus]}">${fmt(param, latestVal)}${param.unit}</div>
        </div>
        <div class="chart-stat">
          <div class="label">Durchschnitt</div>
          <div class="value">${fmt(param, avgVal)}${param.unit}</div>
        </div>
        <div class="chart-stat">
          <div class="label">Messungen</div>
          <div class="value">${values.length}</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="trend-canvas"></canvas></div>
      <div class="legend-row">
        <span><span class="dot" style="background:rgba(111,191,115,0.35)"></span>Idealbereich</span>
        <span><span class="dot" style="background:${STATUS_COLOR.good}"></span>Messwert</span>
      </div>
    </div>
  `;

  drawTrendChart(param, withVal);
}

function selectTrendParam(key){
  ui.selectedParam = key;
  render();

function drawTrendChart(param, withVal){
  const canvas = document.getElementById('trend-canvas');
  if(!canvas || typeof Chart === 'undefined') return;
  if(trendChart){ trendChart.destroy(); trendChart = null; }

  const labels = withVal.map(e => formatDate(e.date));
  const values = withVal.map(e => Number(e[param.key]));
  const pointColors = values.map(v => STATUS_COLOR[getStatus(param, v) || 'good']);
  const goodMin = param.good[0];
  const goodMax = param.good[1];

  trendChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Idealbereich unten',
          data: labels.map(()=>goodMin),
          borderColor: 'transparent',
          pointRadius: 0,
          fill: false,
          order: 3
        },
        {
          label: 'Idealbereich',
          data: labels.map(()=>goodMax),
          borderColor: 'transparent',
          backgroundColor: 'rgba(111,191,115,0.15)',
          pointRadius: 0,
          fill: '-1',
          order: 2
        },
        {
          label: param.label,
          data: values,
          borderColor: '#4FB6C4',
          backgroundColor: 'rgba(79,182,196,0.12)',
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.3,
          fill: false,
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: (item) => item.datasetIndex === 2,
          callbacks: {
            label: (item) => `${param.label}: ${item.formattedValue}${param.unit}`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8FA6A3', font: { size: 10 } },
          grid: { color: 'rgba(143,166,163,0.08)' }
        },
        y: {
          ticks: { color: '#8FA6A3', font: { size: 10 } },
          grid: { color: 'rgba(143,166,163,0.08)' }
        }
      }
    }
  });
}

        `;

    }).join('')}
  `;

function formatDate(iso){
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

          <label class="checkbox-label"><input type="checkbox" id="f-co2adj" ${editing && editing.co2Adjusted ? 'checked' : ''}> CO₂ angepasst</label>
        </div>
        <div class="field">
          <label>Notiz (optional)</label>
          <textarea id="f-note" placeholder="z.B. welcher Dünger, wie viel CO2 …">${editing && editing.note ? escapeHtml(editing.note) : ''}</textarea>
        </div>
        <button class="btn btn-primary" onclick="saveMaintenance()">${editing ? 'Änderungen speichern' : 'Wartung speichern'}</button>
        ${editing ? `<button class="btn btn-danger" onclick="deleteEvent('${editing.id}')">Eintrag löschen</button>` : ''}
      </div>
    `;
  } else if(ui.modal === 'stocking'){
    const editing = ui.editingEventId ? state.events.find(e => e.id === ui.editingEventId) : null;
    const today = new Date().toISOString().slice(0,10);
    const stockingTypes = [
      {key:'einsatz', label:'Einsatz'},
      {key:'verlust', label:'Verlust'},
      {key:'krankheit', label:'Krankheit'},
      {key:'beobachtung', label:'Beobachtung'}
    ];
    overlay.innerHTML = `
      <div class="sheet">
        <button class="close-x" onclick="closeModal()">✕</button>
        <div class="sheet-title">${editing ? 'Besatz-Eintrag bearbeiten' : 'Besatz eintragen'}</div>
        <div class="field">
          <label>Datum</label>
          <input type="date" id="f-date" value="${editing ? editing.date : today}">
        </div>
        <div class="field">
          <label>Art</label>
          <select id="f-stocking-type">
            ${stockingTypes.map(t => `<option value="${t.key}" ${editing && editing.stockingType===t.key ? 'selected' : ''}>${t.label}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Fischart / Bezeichnung</label>
          <input type="text" id="f-species" value="${editing && editing.species ? escapeHtml(editing.species) : ''}" placeholder="z.B. Panzerwelse">
        </div>
        <div class="field">
          <label>Anzahl (optional)</label>
          <input type="number" step="1" id="f-count" value="${editing && editing.count != null ? editing.count : ''}" placeholder="–">
        </div>
        <div class="field">
          <label>Notiz (optional)</label>
          <textarea id="f-note" placeholder="z.B. Panzerwelse haben gelaicht">${editing && editing.note ? escapeHtml(editing.note) : ''}</textarea>
        </div>
        <button class="btn btn-primary" onclick="saveStocking()">${editing ? 'Änderungen speichern' : 'Eintrag speichern'}</button>
        ${editing ? `<button class="btn btn-danger" onclick="deleteEvent('${editing.id}')">Eintrag löschen</button>` : ''}
      </div>
    `;
  } else if(ui.modal === 'assistant'){
    const tank = activeTank();
    const phEntry = lastValueFor('ph');
    const tempEntry = lastValueFor('temp');
    const currentPh = phEntry ? Number(phEntry.ph) : null;
    const currentTemp = tempEntry ? Number(tempEntry.temp) : null;

    const assessed = FISH_DB.map(f => ({ fish:f, ...assessFish(f, tank, currentPh, currentTemp) }))
      .sort((a,b) => (a.status==='good'?0:a.status==='warn'?1:2) - (b.status==='good'?0:b.status==='warn'?1:2));

    const stocked = getStockedGroups().map(g => {
      const match = matchFish(g.species);
      const issues = [];
      if(match){
        if(g.count < match.minGroup){ issues.push(`Nur ${g.count} eingetragen – empfohlen sind mind. ${match.minGroup}.`); }
        const sizeAssessment = assessFish(match, tank, currentPh, currentTemp);
        issues.push(...sizeAssessment.issues);
      }
      return { ...g, match, issues };
    });

    overlay.innerHTML = `
      <div class="sheet">
        <button class="close-x" onclick="closeModal()">✕</button>
        <div class="sheet-title">Besatz-Assistent</div>
        <div class="field-row">
          <div class="field">
            <label>Beckenvolumen (Liter)</label>
            <input type="number" step="1" id="f-tank-liters" value="${tank && tank.volumeLiters != null ? tank.volumeLiters : ''}" placeholder="z.B. 120">
          </div>
          <div class="field">
            <label>Kantenlänge (cm)</label>
            <input type="number" step="1" id="f-tank-length" value="${tank && tank.lengthCm != null ? tank.lengthCm : ''}" placeholder="z.B. 80">
          </div>
        </div>
        <button class="btn btn-ghost" style="margin-top:0;margin-bottom:16px;" onclick="saveTankSize()">Beckengröße speichern</button>
        <div class="empty-hint" style="margin-bottom:14px;">
          Aktuelle Werte: ${currentPh !== null ? `pH ${currentPh}` : 'pH unbekannt'} · ${currentTemp !== null ? `${currentTemp}°C` : 'Temperatur unbekannt'}
        </div>

        ${stocked.length > 0 ? `
          <div class="section-label">Dein aktueller Besatz</div>
          ${stocked.map(s => `
            <div class="fish-row">
              <div class="fish-row-top">
                <span class="fish-name">${escapeHtml(s.species)} ${s.match ? '' : '<span class="empty-hint">(nicht in Datenbank)</span>'}</span>
                <span class="fish-meta">${s.count} Tier${s.count===1?'':'e'}</span>
              </div>
              ${s.issues.map(i => `<div class="fish-issue warn">⚠️ ${escapeHtml(i)}</div>`).join('')}
              ${s.match && s.issues.length===0 ? `<div class="fish-issue good">✓ Sieht laut Datenbank passend aus.</div>` : ''}
            </div>
          `).join('')}
        ` : ''}

        <div class="section-label" style="margin-top:18px;">Passende Arten für dein Becken</div>
        ${assessed.map(a => `
          <div class="fish-row">
            <div class="fish-row-top">
              <span class="fish-name">${escapeHtml(a.fish.name)}</span>
              <span class="fish-meta">ab ${a.fish.minLiters} L${a.fish.minLengthCm ? `, ${a.fish.minLengthCm}+ cm` : ''} · Gruppe ${a.fish.minGroup}+</span>
            </div>
            ${a.status === 'good'
              ? `<div class="fish-issue good">✓ Passt zu Beckengröße &amp; Wasserwerten</div>`
              : a.issues.map(i => `<div class="fish-issue ${a.status}">${a.status==='danger'?'🔴':'🟡'} ${escapeHtml(i)}</div>`).join('')}
            <div class="fish-meta" style="margin-top:4px;">${escapeHtml(a.fish.notes)}</div>
          </div>
        `).join('')}
        <div class="empty-hint" style="margin-top:14px;">
          Nur eine grobe Orientierung anhand gängiger Richtwerte – bei anspruchsvollen Arten immer zusätzlich recherchieren, insbesondere zu Vergesellschaftung und Verträglichkeit untereinander.
        </div>
      </div>
    `;
  }
  document.getElementById('app').appendChild(overlay);
}

function renderEntryFields(editing){
  let rows = '';
  for(let i=0;i<PARAMS.length;i+=2){
    const pair = PARAMS.slice(i,i+2);
    rows += `<div class="field-row">${pair.map(p => fieldHtml(p, editing)).join('')}</div>`;
  }
  return rows;
}

function fieldHtml(p, editing){
  const val = editing && editing[p.key] !== undefined && editing[p.key] !== null ? editing[p.key] : '';
  return `
    <div class="field">
      <label>${p.label}${p.unit ? ' ('+p.unit+')' : ''}</label>
      <input type="number" step="${p.step}" id="f-${p.key}" value="${val}" placeholder="–">
    </div>
  `;
}

async function saveEntry(){
  const date = document.getElementById('f-date').value;
  if(!date){ alert('Bitte ein Datum wählen.'); return; }
  const data = { date };
  PARAMS.forEach(p => {
    const raw = document.getElementById('f-'+p.key).value;
    data[p.key] = raw === '' ? null : Number(raw);
  });
  data.note = document.getElementById('f-note').value.trim();

  if(ui.editingEntryId){
    const idx = state.entries.findIndex(e => e.id === ui.editingEntryId);
    state.entries[idx] = { ...state.entries[idx], ...data };
  } else {
    state.entries.push({ id: uid(), tankId: state.activeTankId, ...data });
  }
  await saveState();
  closeModal();
}

async function deleteEntry(id){
  state.entries = state.entries.filter(e => e.id !== id);
  await saveState();
  closeModal();
}

function matchFish(speciesText){
  if(!speciesText) return null;
  const t = speciesText.toLowerCase();
  return FISH_DB.find(f => t.includes(f.name.toLowerCase()) || (f.aliases||[]).some(a => t.includes(a.toLowerCase())));
}

function getStockedGroups(){
  const events = tankEvents().filter(e => e.kind === 'stocking' && e.stockingType === 'einsatz' && e.species);
  const groups = {};
  events.forEach(e => {
    const key = e.species.trim().toLowerCase();
    if(!groups[key]) groups[key] = { species: e.species.trim(), count: 0 };
    groups[key].count += (e.count != null ? e.count : 1);
  });
  return Object.values(groups);
}

function assessFish(f, tank, currentPh, currentTemp){
  const issues = [];
  if(tank && tank.volumeLiters && f.minLiters && tank.volumeLiters < f.minLiters){
    issues.push(`Becken zu klein (mind. ${f.minLiters} L nötig)`);
  }
  if(f.minLengthCm && tank && tank.lengthCm && tank.lengthCm < f.minLengthCm){
    issues.push(`Kantenlänge zu kurz (mind. ${f.minLengthCm} cm nötig)`);
  }
  if(currentPh !== null && currentPh !== undefined && (currentPh < f.ph[0] || currentPh > f.ph[1])){
    issues.push(`pH weicht ab (ideal ${f.ph[0]}–${f.ph[1]})`);
  }
  if(currentTemp !== null && currentTemp !== undefined && (currentTemp < f.temp[0] || currentTemp > f.temp[1])){
    issues.push(`Temperatur weicht ab (ideal ${f.temp[0]}–${f.temp[1]}°C)`);
  }
  const sizeIssue = issues.some(i => i.includes('Becken') || i.includes('Kantenlänge'));
  const status = issues.length === 0 ? 'good' : (sizeIssue ? 'danger' : 'warn');
  return { issues, status };
}

async function saveTankSize(){
  const tank = activeTank();
  if(!tank) return;
  const litersRaw = document.getElementById('f-tank-liters').value;
  const lengthRaw = document.getElementById('f-tank-length').value;
  tank.volumeLiters = litersRaw === '' ? null : Number(litersRaw);
  tank.lengthCm = lengthRaw === '' ? null : Number(lengthRaw);
  await saveState();
  render();
  openAssistantModal();
}

async function saveMaintenance(){
  const date = document.getElementById('f-date').value;
  if(!date){ alert('Bitte ein Datum wählen.'); return; }
  const pctRaw = document.getElementById('f-wc-percent').value;
  const litersRaw = document.getElementById('f-wc-liters').value;
  const data = {
    kind: 'maintenance',
    date,
    waterChangePercent: pctRaw === '' ? null : Number(pctRaw),
    waterChangeLiters: litersRaw === '' ? null : Number(litersRaw),
    filterCleaned: document.getElementById('f-filter').checked,
    plantsTrimmed: document.getElementById('f-plants').checked,
    fertilized: document.getElementById('f-fert').checked,
    co2Adjusted: document.getElementById('f-co2adj').checked,
    note: document.getElementById('f-note').value.trim()
  };
  if(ui.editingEventId){
    const idx = state.events.findIndex(e => e.id === ui.editingEventId);
    state.events[idx] = { ...state.events[idx], ...data };
  } else {
    state.events.push({ id: uid(), tankId: state.activeTankId, ...data });
  }
  await saveState();
  closeModal();
}

async function saveStocking(){
  const date = document.getElementById('f-date').value;
  if(!date){ alert('Bitte ein Datum wählen.'); return; }
  const countRaw = document.getElementById('f-count').value;
  const data = {
    kind: 'stocking',
    date,
    stockingType: document.getElementById('f-stocking-type').value,
    species: document.getElementById('f-species').value.trim(),
    count: countRaw === '' ? null : Number(countRaw),
    note: document.getElementById('f-note').value.trim()
  };
  if(ui.editingEventId){
    const idx = state.events.findIndex(e => e.id === ui.editingEventId);
    state.events[idx] = { ...state.events[idx], ...data };
  } else {
    state.events.push({ id: uid(), tankId: state.activeTankId, ...data });
  }
  await saveState();
  closeModal();
}

async function deleteEvent(id){
  state.events = (state.events || []).filter(e => e.id !== id);
  await saveState();
  closeModal();
}

async function addTank(){
  const input = document.getElementById('new-tank-name');
  const name = input.value.trim();
  if(!name) return;
  const t = { id: uid(), name };
  state.tanks.push(t);
  state.activeTankId = t.id;
  await saveState();
  render();
  openTankModal();
}
async function renameTank(id, name){
  const t = state.tanks.find(t => t.id === id);
  if(t && name.trim()){ t.name = name.trim(); await saveState(); }
}
async function selectTank(id){
  state.activeTankId = id;
  await saveState();
  closeModal();
}
async function deleteTank(id){
  if(state.tanks.length <= 1){ alert('Du brauchst mindestens ein Aquarium.'); return; }
  if(!confirm('Dieses Aquarium inklusive aller Messwerte löschen?')) return;
  state.tanks = state.tanks.filter(t => t.id !== id);
  state.entries = state.entries.filter(e => e.tankId !== id);
  state.events = (state.events || []).filter(e => e.tankId !== id);
  if(state.activeTankId === id){ state.activeTankId = state.tanks[0].id; }
  await saveState();
  render();
  openTankModal();
}

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `aqualog-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function importData(file){
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!parsed.tanks || !parsed.entries){ throw new Error('invalid'); }
    if(!confirm('Aktuelle Daten in der App durch die Backup-Datei ersetzen?')) return;
    state = parsed;
    normalizeState();
    await saveState();
    render();
  }catch(e){
    alert('Diese Datei konnte nicht gelesen werden. Bitte eine gültige AquaLog-Backup-Datei wählen.');
  }
}

loadState();
</script>
