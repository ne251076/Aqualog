<title>AquaLog</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
<style>
  :root{
    --bg: #0F1B1E;
    --surface: #16262A;
    --surface-2: #1D3034;
    --border: #24393D;
    --text: #EDF3F2;
    --text-muted: #8FA6A3;
    --good: #6FBF73;
    --warn: #E8A33D;
    --danger: #E8604C;
    --accent: #4FB6C4;
    --surface-translucent: rgba(22,38,42,0.92);
  }
  html.theme-light{
    --bg: #F3F8F8;
    --surface: #FFFFFF;
    --surface-2: #EAF1F1;
    --border: #DAE5E5;
    --text: #142023;
    --text-muted: #5B6C6E;
    --good: #2F8A37;
    --warn: #B56A10;
    --danger: #B7362A;
    --accent: #1C7F8C;
    --surface-translucent: rgba(255,255,255,0.92);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(79,182,196,0.10), transparent 60%),
      var(--bg);
  }
  @media (min-width: 700px){
    #app{ max-width: 720px; }
  }
  @media (min-width: 1100px){
    #app{ max-width: 960px; }
  }
  .mono{ font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; }

  /* Top bar */
  header{
    padding: calc(18px + env(safe-area-inset-top)) 18px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom: 1px solid var(--border);
  }
  .brand{ display:flex; flex-direction:column; gap:2px; }
  .brand-title{
    font-family: 'Space Grotesk','Inter',sans-serif;
    font-size: 20px;
    font-weight:700;
    letter-spacing: 0.2px;
  }
  .brand-title span{ color: var(--accent); }
  .tank-select{
    background:none; border:none; color:var(--text-muted); font-size:13px;
    padding:0; display:flex; align-items:center; gap:6px; cursor:pointer;
  }
  .tank-select b{ color:var(--text); font-weight:600; }
  .icon-btn{
    background: var(--surface);
    border: 1px solid var(--border);
    width:38px; height:38px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    color: var(--text-muted); cursor:pointer;
  }
  .icon-btn:active{ background: var(--surface-2); }

  main{ flex:1; padding: 16px 16px 100px; overflow-y:auto; }

  /* Tank chips */
  .tank-chips{ display:flex; gap:8px; overflow-x:auto; padding-bottom:14px; }
  .chip{
    flex-shrink:0;
    padding:7px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{ background: var(--accent); color:#06181A; border-color:var(--accent); font-weight:600; }

  .section-label{
    font-size:11px; text-transform:uppercase; letter-spacing:1.2px;
    color:var(--text-muted); margin: 4px 2px 10px;
  }

  /* Param grid */
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:12px; }
  .card{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px;
    display:flex; flex-direction:column; gap:8px;
  }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .param-label{ font-size:12px; color:var(--text-muted); }
  .status-dot{ width:8px; height:8px; border-radius:50%; margin-top:4px; }
  .status-dot.good{ background: var(--good); }
  .status-dot.warn{ background: var(--warn); }
  .status-dot.danger{ background: var(--danger); }
  .status-dot.none{ background: #3a4a4d; }
  .param-value{ font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; }
  .param-value small{ font-size:13px; font-weight:500; color:var(--text-muted); margin-left:3px; }
  .swatch{
    height:8px; border-radius:5px; position:relative; margin-top:2px;
  }
  .swatch .pointer{
    position:absolute; top:-3px; width:2px; height:14px; background:#fff;
    border-radius:2px; box-shadow:0 0 0 1px rgba(0,0,0,0.4);
  }
  .spark{ align-self:flex-end; opacity:0.9; }
  .empty-hint{ font-size:11px; color:var(--text-muted); }

  /* Stats bar */
  .stats-bar{ display:flex; gap:10px; margin-bottom:18px; }
  .stat-pill{
    flex:1; background: var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:10px 12px; display:flex; flex-direction:column; gap:3px;
  }
  .stat-label{ font-size:10px; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted); }
  .stat-value{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; }

  /* Besatz-Übersicht */
  .stock-card{ margin-bottom:18px; }
  .stock-total{ font-size:12px; color:var(--text-muted); margin-bottom:8px; }
  .stock-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .stock-chip{
    background:var(--surface); border:1px solid var(--border); border-radius:999px;
    padding:6px 12px; font-size:13px; display:inline-flex; align-items:center; gap:4px; color:var(--text);
    cursor:pointer;
  }
  .stock-chip:active{ background:var(--surface-2); }
  .stock-chip b{ color:var(--accent); }

  /* Recommendations */
  .rec-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
  .rec-card{
    display:flex; align-items:flex-start; gap:8px;
    border-radius:12px; padding:10px 12px; font-size:13px;
    border:1px solid var(--border);
  }
  .rec-card.rec-good{ background:rgba(111,191,115,0.1); color:var(--good); border-color:rgba(111,191,115,0.3); font-weight:600; margin-bottom:18px; }
  .rec-card.rec-warn{ background:rgba(232,163,61,0.1); border-color:rgba(232,163,61,0.3); }
  .rec-card.rec-danger{ background:rgba(232,96,76,0.1); border-color:rgba(232,96,76,0.3); }
  .rec-text{ color:var(--text); line-height:1.4; }

  /* Besatz-Assistent */
  .fish-row{
    background: var(--surface-2); border:1px solid var(--border); border-radius:12px;
    padding:10px 12px; margin-bottom:8px;
  }
  .fish-row-top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .fish-name{ font-weight:600; font-size:14px; }
  .fish-meta{ font-size:11px; color:var(--text-muted); }
  .fish-issue{ font-size:12px; margin-top:5px; line-height:1.4; }
  .fish-issue.warn{ color: var(--warn); }
  .fish-issue.danger{ color: var(--danger); }
  .fish-issue.good{ color: var(--good); }

  /* Trends */
  .param-chips{ display:flex; flex-wrap:wrap; gap:8px; padding-bottom:14px; }
  .param-chip{
    flex-shrink:0;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .param-chip .dot{ width:7px; height:7px; border-radius:50%; }
  .param-chip.active{ background: var(--surface-2); color:var(--text); border-color: var(--accent); }
  .chart-card{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 12px 12px;
  }
  .chart-card .stats-row{
    display:flex; justify-content:space-between; padding:0 6px 14px;
  }
  .chart-stat{ display:flex; flex-direction:column; gap:2px; }
  .chart-stat .label{ font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); }
  .chart-stat .value{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; }
  .chart-wrap{ position:relative; height:220px; }
  .legend-row{ display:flex; gap:16px; justify-content:center; margin-top:10px; font-size:11px; color:var(--text-muted); }
  .legend-row .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }

  .empty-state{
    text-align:center; padding: 60px 20px; color:var(--text-muted);
  }
  .empty-state .big{ font-size:40px; margin-bottom:10px; }

  /* History */
  .history-item{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .history-item .date{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; }
  .history-item .vals{ margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; }
  .tag{
    font-size:11px; padding:3px 8px; border-radius:7px;
    background: var(--surface-2); color:var(--text-muted);
  }
  .tag b{ color:var(--text); }
  .history-item .note{ margin-top:6px; font-size:12px; color:var(--text-muted); font-style:italic; }

  /* Bottom nav */
  nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    background: var(--surface-translucent);
    backdrop-filter: blur(10px);
    border-top:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-around;
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
  }
  @media (min-width: 700px){
    nav{ max-width: 720px; }
  }
  @media (min-width: 1100px){
    nav{ max-width: 960px; }
  }
  .nav-btn{
    background:none; border:none; color:var(--text-muted);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:11px; cursor:pointer; padding:6px 10px;
  }
  .nav-btn.active{ color: var(--accent); }
  .fab{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom: calc(52px + env(safe-area-inset-bottom));
    width:54px; height:54px; border-radius:50%;
    background: var(--accent); color:#06181A;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:400;
    border:none; cursor:pointer;
    box-shadow: 0 6px 18px rgba(79,182,196,0.35);
    z-index:10;
  }

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(6,12,13,0.6);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
  }
  .sheet{
    width:100%; max-width:480px;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 18px 18px calc(20px + env(safe-area-inset-bottom));
    max-height: 88vh; overflow-y:auto;
    border-top:1px solid var(--border);
  }
  @media (min-width: 700px){
    .sheet{ max-width: 560px; border-radius:20px; margin-bottom:5vh; }
  }
  .sheet-title{ font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:700; margin-bottom:14px; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--text-muted); margin-bottom:5px; }
  .field input, .field select, .field textarea{
    width:100%; background: var(--surface-2); border:1px solid var(--border);
    border-radius:10px; padding:10px 12px; color:var(--text); font-size:15px;

let state = { tanks: [], entries: [], events: [], activeTankId: null };
let ui = { tab:'overview', modal:null, editingEntryId:null, editingEventId:null, editingStockKey:null, tankModalMode:null, selectedParam:'ph' };
let trendChart = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---------- Darstellung (Hell/Dunkel) ---------- */
function getTheme(){
  try{ return localStorage.getItem('aqualog-theme') || 'dark'; }catch(_){ return 'dark'; }
}
function applyTheme(theme){
  document.documentElement.classList.toggle('theme-light', theme === 'light');
}
function chooseTheme(theme){
  try{ localStorage.setItem('aqualog-theme', theme); }catch(_){}
  applyTheme(theme);
  render();
}
applyTheme(getTheme());

const STORAGE_KEY = 'aqualog-data-v1';
const FIREBASE_URL = 'https://aqualog-94d37-default-rtdb.europe-west1.firebasedatabase.app';
const FIREBASE_PATH = 'aqualog/f7e3a9c2-51b8-4d6a-9c2e-8a1b6d4f0e77';

async function storageGet(){
  const token = await ensureFreshToken();
  if(!token) return localStorage.getItem(STORAGE_KEY);
  try{
    const res = await fetch(`${FIREBASE_URL}/${FIREBASE_PATH}.json?auth=${token}`);
    if(!res.ok) throw new Error('Firebase-Antwort nicht ok');
    const data = await res.json();
    const json = data ? JSON.stringify(data) : null;
    if(json){ try{ localStorage.setItem(STORAGE_KEY, json); }catch(_){} }
    return json;
  }catch(e){
    console.error('Firebase nicht erreichbar, nutze lokalen Zwischenspeicher', e);
    return localStorage.getItem(STORAGE_KEY);
  }
}

async function storageSet(value){
  const token = await ensureFreshToken();
  if(!token){
    try{ localStorage.setItem(STORAGE_KEY, value); }catch(_){}
    return false;
  }
  try{
    const res = await fetch(`${FIREBASE_URL}/${FIREBASE_PATH}.json?auth=${token}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: value
    });
    if(!res.ok) throw new Error('Firebase-Speichern fehlgeschlagen');
    try{ localStorage.setItem(STORAGE_KEY, value); }catch(_){}
    return true;
  }catch(e){
    console.error(e);
    try{ localStorage.setItem(STORAGE_KEY, value); }catch(_){}
    return false;
  }
}

async function loadState(){
  try{
    const raw = await storageGet();
    if(raw){
      state = JSON.parse(raw);
    } else {
      throw new Error('empty');
    }
  }catch(e){
    const firstTank = { id: uid(), name: 'Mein Aquarium' };
    state = { tanks:[firstTank], entries:[], events:[], activeTankId: firstTank.id };
    await saveState();
  }
  normalizeState();
  render();
}

function normalizeState(){
  // Firebase Realtime Database drops empty arrays/objects on save, so a field
  // that was an empty list comes back as undefined after a reload. Normalize.
  if(!Array.isArray(state.tanks)){
    state.tanks = state.tanks ? Object.values(state.tanks) : [];
  }
  if(!Array.isArray(state.entries)){
    state.entries = state.entries ? Object.values(state.entries) : [];
  }
  if(!Array.isArray(state.events)){
    state.events = state.events ? Object.values(state.events) : [];
  }
  if(state.tanks.length === 0){
    const firstTank = { id: uid(), name: 'Mein Aquarium' };
    state.tanks = [firstTank];
    state.activeTankId = firstTank.id;
  }
  if(!state.activeTankId && state.tanks.length){ state.activeTankId = state.tanks[0].id; }
}

async function saveState(){
  const ok = await storageSet(JSON.stringify(state));
  if(!ok){
    console.error('Cloud-Speichern fehlgeschlagen, lokal zwischengespeichert');
    alert('Konnte gerade nicht in die Cloud speichern (kein Internet?). Die Änderung ist vorerst nur lokal gesichert.');
  }
}

const CUSTOMIZABLE_PARAMS = ['ph','temp','no3','kh','gh'];

function getEffectiveParam(key){
  const base = PARAMS.find(p => p.key === key) || PARAMS[0];
  const tank = activeTank();
  const custom = tank && tank.customRanges && tank.customRanges[base.key];
  if(!custom) return base;
  return { ...base, good: custom.good, warn: custom.warn };
}

function getStatus(param, value){
  if(value === null || value === undefined || value === '' || isNaN(value)) return null;
  const v = Number(value);
  const [gMin,gMax] = param.good;
  const [wMin,wMax] = param.warn;
  if(v >= gMin && v <= gMax) return 'good';
  if(v >= wMin && v <= wMax) return 'warn';
  return 'danger';
}

function buildGradient(param){
  const steps = 24;
  let stops = [];
  for(let i=0;i<=steps;i++){
    const v = param.min + (param.max-param.min)*(i/steps);
    const s = getStatus(param, v) || 'good';
    stops.push(`${STATUS_COLOR[s]} ${(i/steps*100).toFixed(1)}%`);
  }
  return `linear-gradient(90deg, ${stops.join(',')})`;
}

function pointerPos(param, value){
  const v = Number(value);
  let pct = (v - param.min) / (param.max - param.min);
  pct = Math.max(0, Math.min(1, pct));
  return (pct*100).toFixed(1) + '%';
}

function fmt(param, value){
  if(value === null || value === undefined || value === '') return null;
  return Number(value).toFixed(param.decimals);
}

function activeTank(){
  return state.tanks.find(t => t.id === state.activeTankId);
}
function tankEntries(){
  return (state.entries || [])
    .filter(e => e.tankId === state.activeTankId)
    .sort((a,b) => a.date < b.date ? 1 : -1);
}
function tankEvents(){
  return (state.events || [])
    .filter(e => e.tankId === state.activeTankId)
    .sort((a,b) => a.date < b.date ? 1 : -1);
}
function daysSince(dateStr){
  const then = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.round((now - then) / 86400000);
}
function lastWaterChangeEvent(){
  return tankEvents().find(e => e.kind === 'maintenance' && (e.waterChangePercent != null || e.waterChangeLiters != null));
}
function daysLabel(days){
  if(days === null || days === undefined) return '–';
  if(days === 0) return 'Heute';
  if(days === 1) return 'Gestern';
  return `vor ${days} Tagen`;
}
function lastValueFor(key){
  const entries = tankEntries();
  for(const e of entries){
    if(e[key] !== null && e[key] !== undefined && e[key] !== '') return e;
  }
  return null;
}
function sparkValues(key, count){
  const entries = tankEntries().slice().reverse(); // chronological
  const vals = entries.filter(e => e[key] !== null && e[key] !== undefined && e[key] !== '').map(e => Number(e[key]));
  return vals.slice(-count);
}

function sparkSvg(param){
  const vals = sparkValues(param.key, 6);
  if(vals.length < 2) return '';
  const w=64,h=26,pad=3;
  const min = Math.min(...vals, param.good[0]);
  const max = Math.max(...vals, param.good[1]);
  const range = (max-min) || 1;
  const pts = vals.map((v,i) => {
    const x = pad + (w-2*pad) * (i/(vals.length-1));
    const y = h-pad - (h-2*pad) * ((v-min)/range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lastStatus = getStatus(param, vals[vals.length-1]) || 'good';
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${STATUS_COLOR[lastStatus]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

    return;
  }
  if(ui.tab === 'overview'){ renderOverview(main); }
  else if(ui.tab === 'trends'){ renderTrends(main); }
  else if(ui.tab === 'events'){ renderEvents(main); }
  else { renderHistory(main); }

function getRecommendations(){
  const recs = [];
  PARAMS.forEach(base => {
    const p = getEffectiveParam(base.key);
    const entryWithVal = lastValueFor(p.key);
    if(!entryWithVal) return;
    const value = entryWithVal[p.key];
    const status = getStatus(p, value);
    if(status === 'warn' || status === 'danger'){
      const direction = Number(value) < p.good[0] ? 'low' : 'high';
      const dict = RECOMMENDATIONS[p.key] && RECOMMENDATIONS[p.key][direction];
      const message = (dict && dict[status]) || `${p.label} liegt außerhalb des Idealbereichs.`;
      recs.push({ key:p.key, param:p, status, message, value });
    }
  });
  recs.sort((a,b) => (a.status === 'danger' ? 0 : 1) - (b.status === 'danger' ? 0 : 1));
  return recs;
}

function renderRecommendations(){
  const recs = getRecommendations();
  if(recs.length === 0){
    return `<div class="rec-card rec-good">✅ Alle gemessenen Werte sind im grünen Bereich.</div>`;
  }
  return `
    <div class="rec-list">
      ${recs.map(r => `
        <div class="rec-card rec-${r.status}">
          <span class="rec-icon">${r.status === 'danger' ? '🔴' : '🟡'}</span>
          <div class="rec-text"><b>${escapeHtml(r.param.label)}</b> (${fmt(r.param, r.value)}${r.param.unit}): ${escapeHtml(r.message)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function getCurrentStock(){
  const events = tankEvents().filter(e => e.kind === 'stocking' && e.species);
  const groups = {};
  events.forEach(e => {
    const key = e.species.trim().toLowerCase();
    if(!groups[key]) groups[key] = { species: e.species.trim(), count: 0 };
    const amount = e.count != null ? e.count : 1;
    if(e.stockingType === 'einsatz') groups[key].count += amount;
    else if(e.stockingType === 'verlust') groups[key].count -= amount;
  });
  return Object.values(groups).filter(g => g.count > 0).sort((a,b) => b.count - a.count);
}

function getGroupPrice(speciesKey){
  const prices = tankEvents()
    .filter(e => e.kind === 'stocking' && e.stockingType === 'einsatz' && e.species && e.species.trim().toLowerCase() === speciesKey && e.pricePerUnit != null)
    .map(e => e.pricePerUnit);
  const unique = [...new Set(prices)];
  return unique.length === 1 ? unique[0] : null;
}

function getStockingTotalCost(){
  return tankEvents()
    .filter(e => e.kind === 'stocking' && e.stockingType === 'einsatz' && e.pricePerUnit != null)
    .reduce((sum, e) => sum + (e.pricePerUnit * (e.count != null ? e.count : 1)), 0);
}

function formatEuro(value){
  return value.toLocaleString('de-DE', { minimumFractionDigits:2, maximumFractionDigits:2 }) + ' €';
}

function renderStockSummary(){
  const stock = getCurrentStock();
  const totalCost = getStockingTotalCost();
  if(stock.length === 0){
    return `<div class="empty-hint" style="margin-bottom:18px;">Noch kein Besatz eingetragen.</div>`;
  }
  const total = stock.reduce((sum,s) => sum + s.count, 0);
  return `
    <div class="stock-card">
      <div class="stock-total">${total} Tier${total===1?'':'e'} · ${stock.length} Art${stock.length===1?'':'en'}${totalCost > 0 ? ` · ${formatEuro(totalCost)} investiert` : ''}</div>
      <div class="stock-list">
        ${stock.map((s,i) => `<span class="stock-chip" onclick="openEditStockModal(${i})">🐟 ${escapeHtml(s.species)} <b>×${s.count}</b></span>`).join('')}
      </div>
    </div>
  `;
}

function renderTrends(main){
  const entries = tankEntries();
  if(entries.length === 0){
    main.innerHTML = `<div class="empty-state"><div class="big">📈</div>Noch keine Messwerte für Trends.<br>Tippe unten auf <b>+</b>, um deinen ersten Eintrag zu machen.</div>`;

  }
  const param = getEffectiveParam(ui.selectedParam) || PARAMS[0];
  const chips = PARAMS.map(p => `
    <button class="param-chip ${p.key===param.key?'active':''}" onclick="selectTrendParam('${p.key}')">
      <span class="dot" style="background:${STATUS_COLOR.good}"></span>${p.label.split(' ')[0]}
    </button>
  `).join('');

  const chron = entries.slice().reverse();
  const withVal = chron.filter(e => e[param.key] !== null && e[param.key] !== undefined && e[param.key] !== '');

  if(withVal.length === 0){
    main.innerHTML = `
      <div class="section-label">Trend wählen</div>

    `;
    return;
  }

  const values = withVal.map(e => Number(e[param.key]));
  const latestVal = values[values.length - 1];
  const avgVal = values.reduce((a,b)=>a+b,0) / values.length;
  const latestStatus = getStatus(param, latestVal) || 'good';

  main.innerHTML = `
    <div class="section-label">Trend wählen</div>

    <div class="chart-card">
      <div class="stats-row">

        </div>

          <div class="value">${fmt(param, avgVal)}${param.unit}</div>
        </div>

          <div class="label">Messungen</div>

        </div>

      <div class="legend-row">
        <span><span class="dot" style="background:rgba(111,191,115,0.35)"></span>Idealbereich</span>

function drawTrendChart(param, withVal){
  const canvas = document.getElementById('trend-canvas');
  if(!canvas || typeof Chart === 'undefined') return;
  if(trendChart){ trendChart.destroy(); trendChart = null; }

  const light = getTheme() === 'light';
  const lineColor = light ? '#1c7f8c' : '#4FB6C4';
  const fillColor = light ? 'rgba(28,127,140,0.10)' : 'rgba(79,182,196,0.12)';
  const tickColor = light ? '#5b6c6e' : '#8FA6A3';
  const gridColor = light ? 'rgba(20,32,35,0.08)' : 'rgba(143,166,163,0.08)';

  const labels = withVal.map(e => formatDate(e.date));
  const values = withVal.map(e => Number(e[param.key]));
  const pointColors = values.map(v => STATUS_COLOR[getStatus(param, v) || 'good']);
  const goodMin = param.good[0];
  const goodMax = param.good[1];

  trendChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Idealbereich unten',
          data: labels.map(()=>goodMin),
          borderColor: 'transparent',
          pointRadius: 0,
          fill: false,
          order: 3
        },
        {
          label: 'Idealbereich',
          data: labels.map(()=>goodMax),
          borderColor: 'transparent',
          backgroundColor: 'rgba(111,191,115,0.15)',
          pointRadius: 0,
          fill: '-1',
          order: 2
        },
        {
          label: param.label,
          data: values,
          borderColor: lineColor,
          backgroundColor: fillColor,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.3,
          fill: false,
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: (item) => item.datasetIndex === 2,
          callbacks: {
            label: (item) => `${param.label}: ${item.formattedValue}${param.unit}`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: tickColor, font: { size: 10 } },
          grid: { color: gridColor }
        },
        y: {
          ticks: { color: tickColor, font: { size: 10 } },
          grid: { color: gridColor }
        }
      }
    }
  });
}

function renderEvents(main){
  const events = tankEvents();

    ${events.map(e => {
      if(e.kind === 'maintenance'){
        const tags = [];
        if(e.waterChangePercent != null || e.waterChangeLiters != null){
          const parts = [];
          if(e.waterChangePercent != null) parts.push(`${e.waterChangePercent}%`);
          if(e.waterChangeLiters != null) parts.push(`${e.waterChangeLiters} L`);
          tags.push(`<span class="tag">💧 Wasserwechsel <b>${parts.join(' / ')}</b></span>`);

        if(e.filterCleaned) tags.push(`<span class="tag">Filter gereinigt</span>`);
        if(e.plantsTrimmed) tags.push(`<span class="tag">Pflanzen geschnitten</span>`);
        if(e.fertilized) tags.push(`<span class="tag">Dünger</span>`);
        if(e.co2Adjusted) tags.push(`<span class="tag">CO₂ angepasst</span>`);
        return `
          <div class="history-item" onclick="openMaintenanceModal('${e.id}')">
            <div class="date">🛠 ${formatDate(e.date)}</div>
            <div class="vals">${tags.join('') || '<span class="tag">Wartung</span>'}</div>
            ${e.note ? `<div class="note">"${escapeHtml(e.note)}"</div>` : ''}
          </div>
        `;
      } else {
        const label = typeLabels[e.stockingType] || e.stockingType;
        return `
          <div class="history-item" onclick="openStockingModal('${e.id}')">
            <div class="date">🐟 ${formatDate(e.date)} · ${label}</div>
            <div class="vals">
              ${e.species ? `<span class="tag"><b>${escapeHtml(e.species)}</b></span>` : ''}

            </div>
            ${e.note ? `<div class="note">"${escapeHtml(e.note)}"</div>` : ''}
          </div>
        `;
      }
    }).join('')}
  `;
}

async function saveTargets(){
  const tank = activeTank();
  if(!tank) return;
  tank.customRanges = tank.customRanges || {};
  CUSTOMIZABLE_PARAMS.forEach(key => {
    const base = PARAMS.find(p => p.key === key);
    const min = Number(document.getElementById(`tg-${key}-min`).value);
    const max = Number(document.getElementById(`tg-${key}-max`).value);
    const marginLow = base.good[0] - base.warn[0];
    const marginHigh = base.warn[1] - base.good[1];
    tank.customRanges[key] = { good:[min,max], warn:[min-marginLow, max+marginHigh] };
  });
  await saveState();
  closeModal();
}

async function resetTargets(){
  const tank = activeTank();
  if(tank){ delete tank.customRanges; await saveState(); }
  closeModal();
}

async function saveStockEdit(){
  const oldKey = ui.editingStockKey;
  const newName = document.getElementById('es-species').value.trim();
  const newCount = Number(document.getElementById('es-count').value);
  const priceRaw = document.getElementById('es-price').value;
  if(!newName){ alert('Bitte einen Namen eingeben.'); return; }
  if(isNaN(newCount) || newCount < 0){ alert('Bitte eine gültige Anzahl (0 oder mehr) eingeben.'); return; }

  const newKey = newName.toLowerCase();
  if(newKey !== oldKey){
    state.events.forEach(e => {
      if(e.kind === 'stocking' && e.tankId === state.activeTankId && e.species && e.species.trim().toLowerCase() === oldKey){
        e.species = newName;
      }
    });
  }

  if(priceRaw !== ''){
    const newPrice = Number(priceRaw);
    state.events.forEach(e => {
      if(e.kind === 'stocking' && e.stockingType === 'einsatz' && e.tankId === state.activeTankId && e.species && e.species.trim().toLowerCase() === newKey){
        e.pricePerUnit = newPrice;
      }
    });
  }

  const recomputed = getCurrentStock().find(g => g.species.trim().toLowerCase() === newKey);
  const currentTotal = recomputed ? recomputed.count : 0;
  const delta = newCount - currentTotal;
  if(delta !== 0){
    state.events.push({
      id: uid(),
      tankId: state.activeTankId,
      kind: 'stocking',
      date: new Date().toISOString().slice(0,10),
      stockingType: delta > 0 ? 'einsatz' : 'verlust',
      species: newName,
      count: Math.abs(delta),
      pricePerUnit: delta > 0 && priceRaw !== '' ? Number(priceRaw) : null,
      note: 'Manuelle Korrektur (Gruppe bearbeitet)'
    });
  }

  await saveState();
  closeModal();
}

async function removeStockGroup(){
  const oldKey = ui.editingStockKey;
  const group = getCurrentStock().find(g => g.species.trim().toLowerCase() === oldKey);
  if(!group){ closeModal(); return; }
  if(!confirm(`"${group.species}" komplett aus dem Besatz entfernen (Anzahl auf 0 setzen)?`)) return;
  state.events.push({
    id: uid(),
    tankId: state.activeTankId,
    kind: 'stocking',
    date: new Date().toISOString().slice(0,10),
    stockingType: 'verlust',
    species: group.species,
    count: group.count,
    note: 'Gruppe entfernt'
  });
  await saveState();
  closeModal();
}

function fieldHtml(p, editing){
  const val = editing && editing[p.key] !== undefined && editing[p.key] !== null ? editing[p.key] : '';
  return `
    <div class="field">
      <label>${p.label}${p.unit ? ' ('+p.unit+')' : ''}</label>
      <input type="number" step="${p.step}" id="f-${p.key}" value="${val}" placeholder="–">

async function saveEntry(){
  const date = document.getElementById('f-date').value;
  if(!date){ alert('Bitte ein Datum wählen.'); return; }
  const data = { date };
  PARAMS.forEach(p => {
    const raw = document.getElementById('f-'+p.key).value;
    data[p.key] = raw === '' ? null : Number(raw);
  });
  data.note = document.getElementById('f-note').value.trim();

  if(ui.editingEntryId){
    const idx = state.entries.findIndex(e => e.id === ui.editingEntryId);
    state.entries[idx] = { ...state.entries[idx], ...data };
  } else {
    state.entries.push({ id: uid(), tankId: state.activeTankId, ...data });
  }
  await saveState();
  closeModal();
}

async function deleteEntry(id){
  state.entries = state.entries.filter(e => e.id !== id);
  await saveState();
  closeModal();
}

function matchFish(speciesText){
  if(!speciesText) return null;
  const t = speciesText.toLowerCase();
  return FISH_DB.find(f => t.includes(f.name.toLowerCase()) || (f.aliases||[]).some(a => t.includes(a.toLowerCase())));
}

function getStockedGroups(){
  const events = tankEvents().filter(e => e.kind === 'stocking' && e.stockingType === 'einsatz' && e.species);
  const groups = {};
  events.forEach(e => {
    const key = e.species.trim().toLowerCase();
    if(!groups[key]) groups[key] = { species: e.species.trim(), count: 0 };
    groups[key].count += (e.count != null ? e.count : 1);
  });
  return Object.values(groups);
}

function assessFish(f, tank, currentPh, currentTemp){
  const issues = [];
  if(tank && tank.volumeLiters && f.minLiters && tank.volumeLiters < f.minLiters){
    issues.push(`Becken zu klein (mind. ${f.minLiters} L nötig)`);
  }
  if(f.minLengthCm && tank && tank.lengthCm && tank.lengthCm < f.minLengthCm){
    issues.push(`Kantenlänge zu kurz (mind. ${f.minLengthCm} cm nötig)`);
  }
  if(currentPh !== null && currentPh !== undefined && (currentPh < f.ph[0] || currentPh > f.ph[1])){
    issues.push(`pH weicht ab (ideal ${f.ph[0]}–${f.ph[1]})`);
  }
  if(currentTemp !== null && currentTemp !== undefined && (currentTemp < f.temp[0] || currentTemp > f.temp[1])){
    issues.push(`Temperatur weicht ab (ideal ${f.temp[0]}–${f.temp[1]}°C)`);
  }
  const sizeIssue = issues.some(i => i.includes('Becken') || i.includes('Kantenlänge'));
  const status = issues.length === 0 ? 'good' : (sizeIssue ? 'danger' : 'warn');
  return { issues, status };
}

  state.tanks = state.tanks.filter(t => t.id !== id);
  state.entries = state.entries.filter(e => e.tankId !== id);
  state.events = (state.events || []).filter(e => e.tankId !== id);

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `aqualog-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function importData(file){
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!parsed.tanks || !parsed.entries){ throw new Error('invalid'); }
    if(!confirm('Aktuelle Daten in der App durch die Backup-Datei ersetzen?')) return;
    state = parsed;
    normalizeState();
    await saveState();
    render();
  }catch(e){
    alert('Diese Datei konnte nicht gelesen werden. Bitte eine gültige AquaLog-Backup-Datei wählen.');
  }
}

function getAuthState(){

function setAuthState(obj){

async function firebaseSignIn(email, password){
  try{
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FIREBASE_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, returnSecureToken: true })
    });
    const data = await res.json();
    if(!res.ok){
      const code = data.error && data.error.message;
      const friendly = {
        'EMAIL_NOT_FOUND': 'Kein Konto mit dieser E-Mail gefunden.',
        'INVALID_PASSWORD': 'Falsches Passwort.',
        'INVALID_LOGIN_CREDENTIALS': 'E-Mail oder Passwort falsch.',
        'USER_DISABLED': 'Dieses Konto wurde deaktiviert.',
        'TOO_MANY_ATTEMPTS_TRY_LATER': 'Zu viele Versuche – bitte später erneut versuchen.'
      };
      return { error: friendly[code] || 'Anmeldung fehlgeschlagen.' };
    }
    setAuthState({
      idToken: data.idToken,
      refreshToken: data.refreshToken,
      expiresAt: Date.now() + Number(data.expiresIn) * 1000,
      email: data.email
    });
    return { ok: true };
  }catch(e){
    return { error: 'Keine Verbindung möglich. Bitte Internetverbindung prüfen.' };
  }
}

async function firebaseRefreshToken(refreshToken){
  try{
    const res = await fetch(`https://securetoken.googleapis.com/v1/token?key=${FIREBASE_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `grant_type=refresh_token&refresh_token=${encodeURIComponent(refreshToken)}`
    });
    const data = await res.json();
    if(!res.ok) return null;
    return {
      idToken: data.id_token,
      refreshToken: data.refresh_token,
      expiresAt: Date.now() + Number(data.expires_in) * 1000
    };
  }catch(e){ return null; }
}

async function ensureFreshToken(){
  const auth = getAuthState();
  if(!auth) return null;
  if(Date.now() < auth.expiresAt - 60000){
    return auth.idToken;
  }
  const refreshed = await firebaseRefreshToken(auth.refreshToken);
  if(!refreshed){
    clearAuthState();
    return null;
  }
  setAuthState({ ...auth, ...refreshed });
  return refreshed.idToken;
}

async function initAuth(){
  const token = await ensureFreshToken();
  if(token){
    loadState();
  } else {
    renderLogin();
  }
}

function renderLogin(errorMsg){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">Bei AquaLog anmelden</div>
      <div class="lock-sub">Melde dich mit deinem AquaLog-Konto an. Nur damit lassen sich deine Wasserwerte lesen oder ändern.</div>
      <div class="field" style="width:100%; max-width:280px;">
        <label>E-Mail</label>
        <input type="email" id="auth-email" autocomplete="username">
      </div>
      <div class="field" style="width:100%; max-width:280px;">
        <label>Passwort</label>
        <input type="password" id="auth-password" autocomplete="current-password" onkeydown="if(event.key==='Enter') submitLogin()">
      </div>
      <div class="lock-error" id="lock-error">${errorMsg || ''}</div>
      <div class="lock-actions">
        <button class="btn btn-primary" onclick="submitLogin()">Anmelden</button>
      </div>
    </div>
  `;
  document.getElementById('auth-email').focus();
}

async function submitLogin(){
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errorEl = document.getElementById('lock-error');
  if(!email || !password){
    errorEl.textContent = 'Bitte E-Mail und Passwort eingeben.';
    return;
  }
  errorEl.textContent = 'Anmeldung läuft …';
  const result = await firebaseSignIn(email, password);
  if(result.error){
    errorEl.textContent = result.error;
  } else {
    loadState();
  }
}

/* ---------- PDF-Bericht ---------- */
function logout(){
  clearAuthState();
  ui.modal = null;
  initAuth();
}

let reportCharts = [];

function ensureReportContainer(){
  let el = document.getElementById('print-report');
  if(!el){
    el = document.createElement('div');
    el.id = 'print-report';
    el.className = 'print-report';
    document.body.appendChild(el);
  }
  return el;
}

function buildReportTable(rows, paramsWithData){
  if(rows.length === 0) return '<div class="empty-hint">Keine Messungen vorhanden.</div>';
  return `
    <table class="pr-table">
      <thead><tr><th>Datum</th>${paramsWithData.map(p => `<th>${escapeHtml(p.label.split(' ')[0])}</th>`).join('')}</tr></thead>
      <tbody>
        ${rows.map(e => `
          <tr>
            <td>${formatDate(e.date)}</td>
            ${paramsWithData.map(p => `<td>${(e[p.key] !== null && e[p.key] !== undefined && e[p.key] !== '') ? fmt(p, e[p.key]) : '–'}</td>`).join('')}
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function buildPrintReport(){
  reportCharts.forEach(c => c.destroy());
  reportCharts = [];

  const tank = activeTank();
  const entries = tankEntries();
  const chron = entries.slice().reverse();
  const recs = getRecommendations();
  const lastTest = entries[0];
  const lastWC = lastWaterChangeEvent();

  const paramsWithData = PARAMS
    .map(base => getEffectiveParam(base.key))
    .filter(p => chron.some(e => e[p.key] !== null && e[p.key] !== undefined && e[p.key] !== ''));

  const stock = getCurrentStock();
  const stockTotal = stock.reduce((sum,s) => sum + s.count, 0);
  const stockCost = getStockingTotalCost();

  const el = ensureReportContainer();
  el.innerHTML = `
    <div class="pr-title">AquaLog – Wasserbericht</div>
    <div class="pr-sub">${escapeHtml(tank ? tank.name : '')} · erstellt am ${new Date().toLocaleDateString('de-DE')}</div>
    <div class="pr-summary">
      <div class="pr-stat"><span>Messungen gesamt</span><b>${entries.length}</b></div>
      <div class="pr-stat"><span>Letzter Test</span><b>${lastTest ? formatDate(lastTest.date) : '–'}</b></div>
      <div class="pr-stat"><span>Letzter Wasserwechsel</span><b>${lastWC ? formatDate(lastWC.date) : '–'}</b></div>
    </div>
    <div class="pr-section-title">Aktueller Besatz</div>
    ${stock.length === 0
      ? `<div class="empty-hint">Kein Besatz eingetragen.</div>`
      : `<div class="pr-sub" style="margin:-6px 0 8px;">${stockTotal} Tier${stockTotal===1?'':'e'} · ${stock.length} Art${stock.length===1?'':'en'}${stockCost > 0 ? ` · ${formatEuro(stockCost)} investiert` : ''}</div>
         <div class="pr-stock-list">${stock.map(s => `<span class="pr-stock-chip">${escapeHtml(s.species)} × ${s.count}</span>`).join('')}</div>`}
    <div class="pr-section-title">Bewertung</div>
    ${recs.length === 0
      ? `<div class="pr-rec good">✓ Alle gemessenen Werte waren zuletzt im Idealbereich.</div>`
      : recs.map(r => `<div class="pr-rec ${r.status}">${escapeHtml(r.param.label)} (${fmt(r.param, r.value)}${r.param.unit}): ${escapeHtml(r.message)}</div>`).join('')}
    <div class="pr-section-title">Verlauf der Werte</div>
    <div class="pr-chart-grid">
      ${paramsWithData.map(p => `
        <div class="pr-chart-card">
          <div class="pr-chart-title">${escapeHtml(p.label)}</div>
          <canvas id="pr-chart-${p.key}" width="340" height="130"></canvas>
        </div>
      `).join('')}
    </div>
    <div class="pr-section-title">Letzte Messungen</div>
    ${buildReportTable(entries.slice(0, 10), paramsWithData)}
    <div class="pr-footer">Erstellt mit AquaLog · ${new Date().toLocaleString('de-DE')}</div>
  `;

  paramsWithData.forEach(p => {
    const canvas = document.getElementById(`pr-chart-${p.key}`);
    if(!canvas || typeof Chart === 'undefined') return;
    const withVal = chron.filter(e => e[p.key] !== null && e[p.key] !== undefined && e[p.key] !== '');
    const labels = withVal.map(e => formatDate(e.date));
    const values = withVal.map(e => Number(e[p.key]));
    const chart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { data: labels.map(()=>p.good[0]), borderColor:'transparent', pointRadius:0, fill:false },
          { data: labels.map(()=>p.good[1]), borderColor:'transparent', backgroundColor:'rgba(79,182,196,0.18)', pointRadius:0, fill:'-1' },
          { data: values, borderColor:'#1c7f8c', backgroundColor:'rgba(28,127,140,0.08)', pointRadius:2, pointBackgroundColor:'#1c7f8c', tension:0.3, fill:false }
        ]
      },
      options: {
        responsive: false,
        animation: false,
        plugins: { legend: { display:false } },
        scales: {
          x: { ticks:{ color:'#888', font:{ size:9 } }, grid:{ color:'#eee' } },
          y: { ticks:{ color:'#888', font:{ size:9 } }, grid:{ color:'#eee' } }
        }
      }
    });
    reportCharts.push(chart);
  });
}

function generateReport(){
  const entries = tankEntries();
  const stock = getCurrentStock();
  if(entries.length === 0 && stock.length === 0){
    alert('Für dieses Aquarium liegen noch keine Messwerte oder Besatzdaten vor.');
    return;
  }
  buildPrintReport();
  setTimeout(() => { window.print(); }, 350);
}

/* ---------- Start ---------- */
async function refreshData(){
  closeModal();
  await loadState();
}

async function silentRefresh(){
  if(ui.modal) return; // nicht mitten in einer offenen Eingabe stören
  try{
    const raw = await storageGet();
    if(raw){
      state = JSON.parse(raw);
      normalizeState();
      render();
    }
  }catch(e){ /* still offline or unreachable, ignore */ }
}

document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible'){
    silentRefresh();
  }
});

/* ---------- Start ---------- */
initAuth();
</script>
